<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>连连看 - 树木与叶子</title>
    <style>
        :root {
            --bg-color: #f0f9eb;
            --border-color: #8bc34a;
            --text-color: #2e7d32;
            --error-color: #f44336;
            --success-color: #4caf50;
            --active-color: #2196f3;
        }

        body {
            margin: 0;
            padding: 10px;
            background-color: var(--bg-color);
            font-family: "Microsoft YaHei", sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        h1 {
            text-align: center;
            color: var(--text-color);
            font-size: 22px;
            margin: 10px 0;
            text-shadow: 1px 1px 2px white;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 85vh;
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            padding: 20px 10px;
        }

        /* 使用Grid确保上下严格对齐 */
        .row {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
            z-index: 2;
        }

        .item {
            background: white;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 5px;
            text-align: center;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            position: relative;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 选中态 */
        .item.active { 
            transform: scale(1.05); 
            border-color: var(--active-color);
            box-shadow: 0 0 15px rgba(33, 150, 243, 0.5);
        }

        /* 已完成态 */
        .item.matched {
            border-color: var(--success-color);
            background-color: #f1f8e9;
        }

        .item img {
            width: 90%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 6px;
            pointer-events: none;
        }

        .item p {
            margin: 4px 0 0 0;
            font-size: 11px;
            color: var(--text-color);
            font-weight: bold;
            line-height: 1.2;
            pointer-events: none;
            height: 2.4em;
            display: flex;
            align-items: center;
        }

        /* 连接点对齐优化 */
        .dot {
            width: 12px;
            height: 12px;
            background: var(--border-color);
            border-radius: 50%;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
        }
        .top-row .dot { bottom: -6px; }
        .bottom-row .dot { top: -6px; }
        .matched .dot { background: var(--success-color); }

        #lineCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* 反馈动画 */
        .feedback-mark {
            position: fixed;
            font-size: 80px;
            font-weight: bold;
            pointer-events: none;
            z-index: 100;
            display: none;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }

        @keyframes popOut {
            0% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(1); }
        }

        .complete-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            border: 5px solid var(--success-color);
            color: var(--success-color);
            padding: 30px 60px;
            border-radius: 25px;
            font-size: 32px;
            font-weight: bold;
            z-index: 200;
            display: none;
            box-shadow: 0 10px 50px rgba(0,0,0,0.3);
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>🌿 连连看：观察叶子找树木</h1>

    <div class="game-container" id="gameArea">
        <div class="row top-row" id="topRow"></div>
        <div class="row bottom-row" id="bottomRow"></div>
        <canvas id="lineCanvas"></canvas>
    </div>

    <div id="errorMark" class="feedback-mark" style="color: var(--error-color);">✕</div>
    <div id="successMark" class="feedback-mark" style="color: var(--success-color);">✓</div>
    <div id="completeMsg" class="complete-msg">🎉 太棒了！<br>全部连对啦！</div>

<script>
    // 1. 数据配置
    const treeData = [
        { id: 'yinxing', name: '银杏树', img: 'yinxing.jpg' },
        { id: 'feng', name: '枫树', img: 'feng.jpg' },
        { id: 'yang', name: '杨树', img: 'yang.jpg' },
        { id: 'liu', name: '柳树', img: 'liu.jpg' },
        { id: 'xing', name: '杏树', img: 'xing.jpg' },
        { id: 'tao', name: '桃树', img: 'tao.jpg' },
        { id: 'song', name: '松树', img: 'song.jpg' },
        { id: 'bai', name: '柏树', img: 'bai.jpg' }
    ];

    const leafData = [
        { id: 'liu', desc: '细长条形叶', img: 'liu_leaf.jpg' },
        { id: 'yang', desc: '胡萝卜形状叶', img: 'yang_leaf.jpg' },
        { id: 'yinxing', desc: '小扇子形状', img: 'yinxing_leaf.jpg' },
        { id: 'song', desc: '针状叶', img: 'song_leaf.png' },
        { id: 'feng', desc: '手掌形状', img: 'feng_leaf.jpg' },
        { id: 'xing', desc: '圆形叶', img: 'xing_leaf.jpg' },
        { id: 'bai', desc: '羽状排列叶', img: 'bai_leaf.jpg' },
        { id: 'tao', desc: '扁圆形叶', img: 'tao_leaf.jpg' }
    ];

    // 2. 音效引擎 (使用 Web Audio API，无需外部文件)
    const AudioEngine = {
        ctx: new (window.AudioContext || window.webkitAudioContext)(),
        
        playTone(freq, type, duration) {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + duration);
        },

        success() { this.playTone(880, 'sine', 0.3); },
        error() { this.playTone(220, 'square', 0.3); },
        complete() {
            // 语音合成
            const msg = new SpeechSynthesisUtterance("恭喜你，全部连对啦！");
            msg.lang = 'zh-CN';
            msg.rate = 1;
            window.speechSynthesis.speak(msg);
        }
    };

    const canvas = document.getElementById('lineCanvas');
    const ctx = canvas.getContext('2d');
    let startItem = null;
    let isDragging = false;
    let currentX = 0;
    let currentY = 0;
    let connections = []; 

    function init() {
        const topRow = document.getElementById('topRow');
        const bottomRow = document.getElementById('bottomRow');

        // 渲染 (可以对leafData进行洗牌以增加难度)
        const shuffledLeaf = [...leafData].sort(() => Math.random() - 0.5);

        treeData.forEach(item => topRow.innerHTML += createItem(item, 'tree'));
        shuffledLeaf.forEach(item => bottomRow.innerHTML += createItem(item, 'leaf'));

        window.addEventListener('resize', resize);
        setTimeout(resize, 100);
    }

    function createItem(data, type) {
        return `
            <div class="item" data-id="${data.id}" data-type="${type}" id="${type}-${data.id}">
                <img src="${data.img}" alt="${data.name || ''}" onerror="this.src='https://via.placeholder.com/100?text=图片'">
                <p>${data.name || data.desc}</p>
                <div class="dot"></div>
            </div>`;
    }

    function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        draw();
    }

    function getDotCenter(el) {
        const dot = el.querySelector('.dot');
        const rect = dot.getBoundingClientRect();
        const containerRect = document.getElementById('gameArea').getBoundingClientRect();
        return {
            x: rect.left - containerRect.left + rect.width / 2,
            y: rect.top - containerRect.top + rect.height / 2
        };
    }

    // 交互逻辑
    function onStart(e) {
        if (AudioEngine.ctx.state === 'suspended') AudioEngine.ctx.resume();
        const item = e.target.closest('.item');
        if (item && item.dataset.type === 'tree') {
            // 如果已经连过了，不允许再次从这里开始（除非你想支持重连）
            if (connections.find(c => c.fromId === item.dataset.id)) return;
            
            startItem = item;
            isDragging = true;
            item.classList.add('active');
            const pos = getEventPos(e);
            updateCurrentPos(pos);
        }
    }

    function onMove(e) {
        if (!isDragging) return;
        e.preventDefault();
        const pos = getEventPos(e);
        updateCurrentPos(pos);
        
        const hoveredLeaf = document.elementFromPoint(pos.clientX, pos.clientY)?.closest('.item.leaf');
        draw(hoveredLeaf);
    }

    function onEnd(e) {
        if (!isDragging) return;
        const endItem = document.elementFromPoint(currentX_global, currentY_global)?.closest('.item');

        if (endItem && endItem.dataset.type === 'leaf') {
            if (endItem.dataset.id === startItem.dataset.id) {
                // 成功
                if (!connections.find(c => c.leafId === endItem.dataset.id)) {
                    connections.push({
                        fromId: startItem.dataset.id,
                        leafId: endItem.dataset.id,
                        startEl: startItem,
                        endEl: endItem
                    });
                    startItem.classList.add('matched');
                    endItem.classList.add('matched');
                    AudioEngine.success();
                    showFeedback('successMark');
                    checkComplete();
                }
            } else {
                // 失败
                AudioEngine.error();
                showFeedback('errorMark');
            }
        }

        startItem.classList.remove('active');
        startItem = null;
        isDragging = false;
        draw();
    }

    let currentX_global, currentY_global;
    function updateCurrentPos(pos) {
        const containerRect = document.getElementById('gameArea').getBoundingClientRect();
        currentX = pos.clientX - containerRect.left;
        currentY = pos.clientY - containerRect.top;
        currentX_global = pos.clientX;
        currentY_global = pos.clientY;
    }

    function getEventPos(e) {
        return e.touches ? e.touches[0] : e;
    }

    function draw(hoveredLeaf) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 画已确定的线
        ctx.setLineDash([]);
        ctx.lineWidth = 4;
        ctx.strokeStyle = '#4CAF50';
        connections.forEach(conn => {
            const p1 = getDotCenter(conn.startEl);
            const p2 = getDotCenter(conn.endEl);
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
        });

        // 画拖拽中的线
        if (isDragging && startItem) {
            const p1 = getDotCenter(startItem);
            ctx.setLineDash([5, 5]);
            ctx.lineWidth = 3;
            
            if (hoveredLeaf) {
                ctx.strokeStyle = hoveredLeaf.dataset.id === startItem.dataset.id ? '#4CAF50' : '#f44336';
            } else {
                ctx.strokeStyle = '#2196F3';
            }

            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(currentX, currentY);
            ctx.stroke();
        }
    }

    function showFeedback(elementId) {
        const el = document.getElementById(elementId);
        el.style.left = (currentX_global - 40) + 'px';
        el.style.top = (currentY_global - 40) + 'px';
        el.style.display = 'block';
        el.style.animation = 'popOut 0.6s forwards';
        setTimeout(() => el.style.display = 'none', 600);
    }

    function checkComplete() {
        if (connections.length === treeData.length) {
            setTimeout(() => {
                AudioEngine.complete();
                document.getElementById('completeMsg').style.display = 'block';
            }, 500);
        }
    }

    const area = document.getElementById('gameArea');
    area.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    area.addEventListener('touchstart', (e) => { e.preventDefault(); onStart(e); }, {passive: false});
    window.addEventListener('touchmove', (e) => { e.preventDefault(); onMove(e); }, {passive: false});
    window.addEventListener('touchend', onEnd);

    init();
</script>
</body>
</html>
